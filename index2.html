  { id:40, category:"緊急対応", level:"応用", type:"4択", question:"薪ストーブから煙が充満している場合の対応として最優先すべきことは？", options:["換気をしてもらい安全を確保する","すぐに薪ストーブを閉める","そのまま使い続けてもらう","翌日対応する"], answer:0, explanation:"煙の充満は安全に関わるため、まず換気して安全を確保することが最優先です。その後、操作方法を確認します。" },
  { id:66, category:"緊急対応", level:"基礎", type:"○×", question:"ゲストが体調不良（軽症）を訴えた場合、まず近くの医療機関を案内する。", options:["○ 正しい","× 間違い"], answer:0, explanation:"体調不良の場合はまず医療機関を案内します。重篤な場合は救急への連絡を促します。" },
  { id:67, category:"緊急対応", level:"応用", type:"4択", question:"トイレが詰まった場合の最初の対応は？", options:["即座に業者を手配する","ゲストへ対処方法を案内し改善しなければエスカレーション","予約をキャンセルする","翌日対応する"], answer:1, explanation:"まずゲストへ対処方法を案内し、改善しない場合はエスカレーションします。" },
  { id:68, category:"緊急対応", level:"応用", type:"○×", question:"緊急事態が発生した場合は、スタッフへの報告より先にゲストの安全確保を優先する。", options:["○ 正しい","× 間違い"], answer:0, explanation:"いかなる緊急事態でもゲストの安全確保が最優先です。その後、速やかにスタッフへ報告します。" },

  // ===== 付帯サービス =====
  { id:41, category:"付帯サービス", level:"基礎", type:"○×", question:"カーシェアサービスはSANU 2nd Homeの付帯サービスとして利用できる。", options:["○ 正しい","× 間違い"], answer:0, explanation:"カーシェアはSANU 2nd Homeの付帯サービスの一つです。利用方法についての問い合わせに対応できるようにしましょう。" },
  { id:42, category:"付帯サービス", level:"基礎", type:"4択", question:"「Stay Gift」とは何ですか？", options:["宿泊時に贈るギフト券サービス","食材のデリバリーサービス","アーリーチェックインの特典","駐車場の無料サービス"], answer:0, explanation:"Stay Giftは宿泊に関連したギフト券サービスです。料金や使い方についての問い合わせに対応できるようにしましょう。" },
  { id:43, category:"付帯サービス", level:"応用", type:"穴埋め", question:"「One more cabin」とは、追加で___を予約できるサービスである。", options:["キャビン","食事","アクティビティ","駐車場"], answer:0, explanation:"One more cabinは追加でキャビンを予約できるサービスです。使い方についての問い合わせに正しく対応しましょう。" },
  { id:69, category:"付帯サービス", level:"基礎", type:"○×", question:"付帯サービスの利用料はすべて月会費に含まれている。", options:["○ 正しい","× 間違い"], answer:1, explanation:"付帯サービスによっては別途料金が発生するものもあります。各サービスの料金体系を確認してゲストに案内してください。" },
  { id:70, category:"付帯サービス", level:"応用", type:"4択", question:"カーシェアの車が故障した場合の対応として正しいのは？", options:["ゲストが自費で修理する","カーシェア会社の緊急連絡先へ案内する","予約をキャンセルする","翌日まで待つ"], answer:1, explanation:"カーシェアの故障時はカーシェア会社の緊急連絡先へ案内します。" },

  // ===== 拠点・自然環境 =====
  { id:71, category:"拠点・自然環境", level:"基礎", type:"4択", question:"SANU 2nd Homeの拠点は主にどのようなエリアに位置していますか？", options:["都市部","自然豊かな郊外・山間・湖畔","空港周辺","繁華街"], answer:1, explanation:"SANU 2nd Homeの拠点は自然豊かなエリアに設置されています。" },
  { id:72, category:"拠点・自然環境", level:"基礎", type:"○×", question:"拠点周辺での野生動物との遭遇に備え、ゲストへ注意事項を案内することが重要である。", options:["○ 正しい","× 間違い"], answer:0, explanation:"自然環境に近い拠点では野生動物との遭遇がありえます。ゲストへの注意喚起は重要な案内の一つです。" },
  { id:73, category:"拠点・自然環境", level:"応用", type:"4択", question:"大雪・台風等の悪天候が予想される場合のゲストへの対応は？", options:["何も案内しない","事前に安全情報・注意事項を案内する","即座に予約をキャンセルする","拠点を閉鎖する"], answer:1, explanation:"悪天候が予想される場合は事前に安全情報や注意事項をゲストに案内することが重要です。" },
  { id:74, category:"拠点・自然環境", level:"基礎", type:"○×", question:"拠点によってアメニティの内容が異なる場合がある。", options:["○ 正しい","× 間違い"], answer:0, explanation:"アメニティは拠点によって異なる場合があります。ゲストへの案内は拠点ごとのマニュアルを確認してください。" },
  { id:75, category:"拠点・自然環境", level:"応用", type:"4択", question:"ゲストから「周辺のおすすめスポット」を聞かれた場合の対応は？", options:["対応範囲外として断る","拠点マニュアルや案内資料を参考に案内する","個人的な意見だけを伝える","インターネットで検索してもらう"], answer:1, explanation:"周辺スポットの案内は拠点マニュアルや案内資料を参考に行います。ゲスト体験向上に繋がる重要な対応です。" },
];

const CAT_BADGE = {
  "予約":"badge-blue","チェックイン・アウト":"badge-green","ハウスルール":"badge-yellow",
  "備品・設備":"badge-orange","滞在":"badge-purple","支払い":"badge-red",
  "Weekday会員":"badge-indigo","Co-Owners":"badge-pink","緊急対応":"badge-rose",
  "付帯サービス":"badge-teal","拠点・自然環境":"badge-green"
};
const CATEGORIES = [...new Set(ALL_QUESTIONS.map(q => q.category))];

function App() {
  const [screen, setScreen] = useState("home");
  const [name, setName] = useState("");
  const [selCats, setSelCats] = useState([]);
  const [mode, setMode] = useState("random");
  const [questions, setQuestions] = useState([]);
  const [cur, setCur] = useState(0);
  const [chosen, setChosen] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [results, setResults] = useState([]);

  const toggleCat = c => setSelCats(p => p.includes(c) ? p.filter(x=>x!==c) : [...p,c]);

  const start = () => {
    if (!name.trim()) { alert("お名前を入力してください"); return; }
    let f = ALL_QUESTIONS;
    if (selCats.length) f = f.filter(q => selCats.includes(q.category));
    if (!f.length) { alert("条件に合う問題がありません。フィルターを変更してください。"); return; }
    let qs;
    if (mode === "all") {
      qs = [...f].sort((a,b) => a.id - b.id);
    } else {
      qs = [...f].sort(()=>Math.random()-0.5).slice(0,10);
    }
    setQuestions(qs); setCur(0); setChosen(null); setAnswered(false); setResults([]);
    setScreen("quiz");
  };

  const select = i => {
    if (answered) return;
    setChosen(i); setAnswered(true);
    setResults(p => [...p, { q: questions[cur], chosen: i, correct: i === questions[cur].answer }]);
  };

  const next = () => {
    if (cur+1 >= questions.length) { setScreen("result"); return; }
    setCur(c=>c+1); setChosen(null); setAnswered(false);
  };

  const score = results.filter(r=>r.correct).length;
  const pct = questions.length ? Math.round(score/questions.length*100) : 0;

  if (screen === "home") return (
    <div className="container">
      <div className="card text-center" style={{marginBottom:16}}>
        <span className="emoji-big">🌲</span>
        <h1>SANU 2nd Home</h1>
        <p className="subtitle">知識チェッククイズ</p>
        <p className="desc">全{ALL_QUESTIONS.length}問</p>
      </div>
      <div className="card">
        <label style={{fontWeight:700,color:"#374151",display:"block",marginBottom:8}}>👤 お名前を入力</label>
        <input className="name-input" placeholder="例：田中 太郎" value={name} onChange={e=>setName(e.target.value)} />
      </div>
      <div className="card">
        <h2 style={{fontSize:15}}>📋 出題モード</h2>
        <div style={{display:"flex",gap:8,marginBottom:4}}>
          <button className={`filter-btn ${mode==="random"?"active":""}`} onClick={()=>setMode("random")}>🎲 ランダム10問</button>
          <button className={`filter-btn ${mode==="all"?"active":""}`} onClick={()=>setMode("all")}>📚 全問チャレンジ</button>
        </div>
        <p className="text-sm" style={{marginTop:6}}>{mode==="random"?"フィルター条件からランダムに10問出題されます":"フィルター条件の全問題を順番に出題します"}</p>
      </div>
      <div className="card">
        <h2 style={{fontSize:15}}>📂 カテゴリ（空白で全て）</h2>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {CATEGORIES.map(c=>(
            <button key={c} className={`filter-btn ${selCats.includes(c)?"active":""}`} onClick={()=>toggleCat(c)}>{c}</button>
          ))}
        </div>
      </div>
      <button className="btn btn-primary" onClick={start}>クイズスタート 🚀</button>
      <p className="text-sm text-center mt-2">{mode==="all"?"全問出題されます（フィルターなしで75問）":"ランダムに10問出題されます"}</p>
    </div>
  );

  if (screen === "quiz") {
    const q = questions[cur];
    return (
      <div className="container">
        <div className="flex-between" style={{marginBottom:12}}>
          <span className="text-sm">{cur+1} / {questions.length}</span>
          <div className="tag-row" style={{margin:0}}>
            <span className={`badge ${CAT_BADGE[q.category]||"badge-gray"}`}>{q.category}</span>
            <span className={`badge ${q.level==="基礎"?"badge-gray":"badge-amber"}`}>{q.level}</span>
            <span className="badge badge-gray">{q.type}</span>
          </div>
        </div>
        <div className="progress-bar"><div className="progress-fill" style={{width:`${(cur+1)/questions.length*100}%`}} /></div>
        <div className="card"><p style={{fontSize:17,fontWeight:600,lineHeight:1.6,color:"#111827"}}>{q.question}</p></div>
        <div>
          {q.options.map((opt,i)=>{
            let cls = "btn-outline";
            if (answered) {
              if (i===q.answer) cls += " btn-correct";
              else if (i===chosen) cls += " btn-wrong";
              else cls += " btn-dim";
            }
            return (
              <button key={i} className={cls} onClick={()=>select(i)}>
                <span style={{fontWeight:700,marginRight:8}}>{["A","B","C","D"][i]}.</span>{opt}
                {answered && i===q.answer && <span style={{float:"right"}}>✅</span>}
                {answered && i===chosen && i!==q.answer && <span style={{float:"right"}}>❌</span>}
              </button>
            );
          })}
        </div>
        {answered && (
          <div className={`explanation ${chosen===q.answer?"explanation-correct":"explanation-wrong"}`}>
            <strong>{chosen===q.answer?"✅ 正解！":"❌ 不正解"}</strong>
            <p style={{marginTop:6,lineHeight:1.6}}>{q.explanation}</p>
          </div>
        )}
        {answered && (
          <button className="btn btn-primary mt-4" onClick={next}>
            {cur+1>=questions.length?"結果を見る 🏁":"次の問題へ →"}
          </button>
        )}
      </div>
    );
  }

  if (screen === "result") {
    const emoji = pct===100?"🏆":pct>=80?"🌟":pct>=60?"📚":"💡";
    const msg = pct===100?"完璧です！":pct>=80?"素晴らしい！":pct>=60?"もう少し！":"復習しましょう！";
    return (
      <div className="container">
        <div className="card text-center">
          <span className="emoji-big">{emoji}</span>
          <h2>{name}さん、{msg}</h2>
          <div className="score-circle">{score}<span style={{fontSize:24,color:"#9ca3af"}}> / {questions.length}</span></div>
          <div style={{background:"#e5e7eb",borderRadius:99,height:12,overflow:"hidden",margin:"8px 0"}}>
            <div style={{height:"100%",borderRadius:99,background:pct>=80?"#22c55e":pct>=60?"#facc15":"#f87171",width:`${pct}%`,transition:"width 0.5s"}} />
          </div>
          <p className="text-sm">{pct}%正解</p>
        </div>
        <h2 style={{marginBottom:10,fontSize:16}}>📋 振り返り</h2>
        {results.map((r,i)=>(
          <div key={i} className={`review-item ${r.correct?"review-correct":"review-wrong"}`}>
            <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
              <span>{r.correct?"✅":"❌"}</span>
              <div>
                <p style={{fontSize:14,fontWeight:600,color:"#1f2937"}}>{r.q.question}</p>
                {!r.correct && <p style={{fontSize:12,color:"#6b7280",marginTop:4}}>正解: <strong style={{color:"#15803d"}}>{r.q.options[r.q.answer]}</strong></p>}
              </div>
            </div>
          </div>
        ))}
        <button className="btn btn-primary mt-4" onClick={()=>{setScreen("home");setResults([]);}}>
          もう一度挑戦する 🔄
        </button>
      </div>
    );
  }
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
